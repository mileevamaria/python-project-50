name: python-package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install uv 
        make install 

    - name: Run linter and pytest
      run: |
        make lint
        # make test
    
    - name: Run test coverage
      run: |
        make test-coverage

    - name: Debug coverage
      run: |
        pwd
        ls -la
        test -f coverage.xml && echo "FOUND" || echo "NOT FOUND"

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7
      with:
        args: >
          -Dsonar.projectKey=mileevamaria_python-project-50
          -Dsonar.organization=mileevamaria
          -Dsonar.python.coverage.reportPaths=coverage.xml
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}